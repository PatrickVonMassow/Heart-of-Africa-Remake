name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch, and allow a manual run.
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GITHUB_ACTIONS is set on the runner, so vite.config.ts picks the
      # /Heart-of-Africa-Remake/ base path for correct Pages asset URLs.
      - name: Build
        run: npm run build

      # Frozen playable tag stands under /v0.1/ and /poc/ (TASKS point 103): the
      # same Pages site serves main at the root and each tag at its subpath —
      # GitHub allows one Pages site per repository, so every frozen stand is a
      # subdirectory of the same artifact, rebuilt from its immutable tag on
      # every deploy. Each tag is guarded so the workflow still deploys the ones
      # that exist while another does not.
      - name: Build the frozen tag stands (v0.1, poc)
        run: |
          for tag in v0.1 poc; do
            if [ -z "$(git ls-remote --tags origin "$tag")" ]; then
              echo "tag $tag does not exist yet — skipping"
              continue
            fi
            git fetch --depth 1 origin tag "$tag"
            git worktree add "src-$tag" "$tag"
            ( cd "src-$tag" && npm ci && npx tsc -b && npx vite build --base="/Heart-of-Africa-Remake/$tag/" )
            mkdir -p "dist/$tag"
            cp -r "src-$tag/dist/." "dist/$tag/"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
