name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch, and allow a manual run.
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GITHUB_ACTIONS is set on the runner, so vite.config.ts picks the
      # /Heart-of-Africa-Remake/ base path for correct Pages asset URLs.
      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
