name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch, and allow a manual run.
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GITHUB_ACTIONS is set on the runner, so vite.config.ts picks the
      # /Heart-of-Africa-Remake/ base path for correct Pages asset URLs.
      - name: Build
        run: npm run build

      # Frozen playable v0.1 stand under /v0.1/ (TASKS point 103): the same
      # Pages site serves main at the root and the v0.1 tag at the subpath —
      # GitHub allows one Pages site per repository, so the frozen stand is a
      # subdirectory of the same artifact, rebuilt from the immutable tag on
      # every deploy. Guarded so the workflow still deploys main-only while
      # the tag does not exist yet.
      - name: Check for the v0.1 tag
        id: v01
        run: |
          if [ -n "$(git ls-remote --tags origin v0.1)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the frozen v0.1 stand
        if: steps.v01.outputs.exists == 'true'
        run: |
          git fetch --depth 1 origin tag v0.1
          git worktree add v01-src v0.1
          cd v01-src
          npm ci
          npx tsc -b
          npx vite build --base=/Heart-of-Africa-Remake/v0.1/
          cd ..
          mkdir -p dist/v0.1
          cp -r v01-src/dist/. dist/v0.1/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
