# CI safety net beside the local verification (user-approved 2026-07-14):
# a fast gate (build + lint + audit + the whole Vitest layer) on every push.
#
# The full browser regression is NOT run in CI: the Playwright scene suites
# need a real GPU (RAF-driven wildlife, screenshots, timing), and GitHub's
# hosted runners have none — Chromium falls back to a software rasterizer at
# ~1 fps, so the RAF suites all time out (13/18 failed, pure-data suites
# aside). The browser regression is therefore verified LOCALLY on real GPU
# hardware (see scripts/verify/README.md); it would only return to CI with a
# self-hosted GPU runner. (Removed 2026-07-15 after the nightly job proved
# unwinnable on the hosted runners.)
name: CI

on:
  push:
    # main AND the per-point feature branches (feature-branch workflow,
    # CLAUDE.md §6): branch pushes must run the fast gate too, or days of
    # branch commits reach the merge with zero CI coverage.
    branches: [main, 'feat/**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Retry npm ci against transient native-dep (sharp/onnxruntime-node)
      # binary-fetch flakes; a genuine failure still exits non-zero.
      - run: |
          n=0; until npm ci; do n=$((n+1)); [ "$n" -ge 3 ] && exit 1; echo "npm ci failed, retry $n after 15s"; sleep 15; done
      - run: npm run build
      - run: npm run lint
      # Fails on any NEW advisory; tolerates recorded, unfixable ones
      # (CLAUDE.md §7.1 pt.18). See the ALLOW list in scripts/audit-check.mjs.
      - run: node scripts/audit-check.mjs
      - run: npm run test:unit
      # Layer B of the CI-red detection (the PRIMARY guaranteed push): a red run
      # pings the user's/assistant's ntfy topic directly from the runner, so a
      # failure is announced even when no local session is looking. Requires the
      # repo secret NTFY_TOPIC (same value as the local .claude/ntfy-topic);
      # without it the step logs and no-ops — it must NEVER fail the build.
      - name: Alert ntfy on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -fsS -m 10 \
              -H "Title: HoA batch: CI red" \
              -H "Priority: high" \
              -H "Tags: rotating_light" \
              -d "CI '${{ github.workflow }}' FAILED for ${GITHUB_SHA::7} on ${{ github.ref_name }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "https://ntfy.sh/${NTFY_TOPIC}" || echo "ntfy alert failed (non-fatal)"
          else
            echo "NTFY_TOPIC secret not set — skipping the failure alert"
          fi
